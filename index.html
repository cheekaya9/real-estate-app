<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #2BB673;
            --secondary: #1E90FF;
            --text-primary: #333;
            --text-secondary: #777;
            --bg-body: #F4F4F4;
            --bg-card: #FFFFFF;
            --bg-input: #FFFFFF;
            --border-color: #E0E0E0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --header-bg: transparent;
        }

        body.dark-mode {
            --text-primary: #F1F1F1;
            --text-secondary: #AAAAAA;
            --bg-body: #121212;
            --bg-card: #1E1E1E;
            --bg-input: #2C2C2C;
            --border-color: #444;
            --shadow: 0 4px 12px rgba(255, 255, 255, 0.05);
            --header-bg: #121212;
        }

        body {
            background: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone {
            width: 320px;
            height: 640px;
            background: var(--bg-card);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            border: 5px solid #EAEAEA;
        }

        @media (max-width: 600px) {
            .phone {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
                border: none;
            }
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen.active {
            display: block;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        /* Splash Screen */
        #splash {
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #splash .logo {

            color: var(--primary);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #splash img {
            width: 100px;

        }

        #splash .subtitle {

            color: var(--text-secondary);

        }

        /* Home Screen */
        .header {

            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;

        .header .title {

        .header .search-icon {

        .banner {

        .property-card {

        /* Auth Screen */

        .btn-auth {

        .btn-primary {

        .btn-back {

        /* Details Screen */
        #details .image-slider {

        #details img {

        #details .details-content {

        #details .details-card {

        .theme-toggle {

</head>

<body>

    <div id="loading-overlay">جاري تحميل البيانات...</div>

    <div class="phone">

        <!-- Splash Screen -->

        </div>

    <script>
        // Use Supabase credentials from the input
        const SUPABASE_URL = "https://arycfnlqkgrqxyqixcpa.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyeWNmbmxxa2dycXh5cWl4Y3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTQwNjgsImV4cCI6MjA5MjI5MDA2OH0.3olrFQ-tTNIHgvtExloyCyqqm0xw_aWhokHfxWhyDD8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let propertiesData = [];
        let currentUserId = null;

        // Function to show/hide loading overlay
        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }

        // --- Screen Navigation ---
        function showScreen(screenId) {
            document.querySelectorAll(".screen").forEach(screen => {
                screen.classList.remove("active");
            });
            document.getElementById(screenId).classList.add("active");
        }

        function goHome() {
            showScreen("home");
            loadData();
        }

        async function goAdd() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showScreen("add");
            } else {
                alert("يرجى تسجيل الدخول أو إنشاء حساب لإضافة عقار.");
                showScreen("auth");
            }
        }

        // --- Dark Mode ---
        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
            const isDark = document.body.classList.contains("dark-mode");
            document.getElementById("theme-btn").innerText = isDark ? "☀️" : "🌙";
            localStorage.setItem("theme", isDark ? "dark" : "light");
        }

        // Apply dark mode on load
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            document.getElementById("theme-btn").innerText = "☀️";
        }

        // --- Auth System ---
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
        }

        async function register() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            if (!email || !password) return alert("الرجاء إدخال البريد الإلكتروني وكلمة المرور");

            showLoading(true);
            const { error } = await supabaseClient.auth.signUp({ email, password });
            showLoading(false);

            if (error) {
                alert("خطأ في إنشاء الحساب: " + error.message);
            } else {
                alert("تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن.");
                showScreen("auth");
            }
        }

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            if (!email || !password) return alert("الرجاء إدخال البريد الإلكتروني وكلمة المرور");

            showLoading(true);
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            showLoading(false);

            if (error) {
                alert("بيانات الدخول غير صحيحة!");
            } else {
                goHome();
            }
        }

        async function logout() {
            showLoading(true);
            await supabaseClient.auth.signOut();
            showLoading(false);
            goHome();
        }

        // --- Load Properties ---
        async function loadData() {
            // Get current user session
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUserId = session ? session.user.id : null;

            // Update login/logout button
            const authBtn = document.getElementById("auth-btn");
            if (currentUserId) {
                authBtn.style.display = "block";
                authBtn.innerText = "خروج";
                authBtn.style.color = "#ff4757";
            } else {
                authBtn.style.display = "block";
                authBtn.innerText = "دخول";
                authBtn.style.color = "#1e90ff";
                authBtn.onclick = () => showScreen("auth");
            }

            const list = document.getElementById("list");
            list.innerHTML = `<div style="text-align: center; margin-top: 50px; color: var(--text-sub);">جاري جلب البيانات... ⏳</div>`;

            showLoading(true);
            const { data, error } = await supabaseClient.from('properties').select("*");
            showLoading(false);

            if (error) {
                list.innerHTML = `<div style="text-align: center; margin-top: 50px; color: #ff4757;">خطأ في جلب البيانات</div>`;
                console.error("Error fetching data:", error);
                return;
            }

            propertiesData = data;
            renderProperties(propertiesData);
        }

        function renderProperties(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";

            if (data.length === 0) {
                list.innerHTML = `<div style="text-align: center; margin-top: 50px; color: var(--text-sub);">لا توجد عقارات مطابقة 🔍</div>`;
                return;
            }

            data.forEach(p => {
                const imageUrl = p.image_url ? p.image_url.split(',')[0] : 'https://img.icons8.com/plasticine/200/home.png';
                const isOwner = currentUserId && p.user_id === currentUserId;

                const cardHtml = `
                    <div class="property-card" onclick="viewProperty('${p.id}')">
                        <div class="image-container">
                            <img src="${imageUrl}" alt="${p.title}">
                            ${isOwner ? '<span class="match-badge">90%</span>' : ''}
                        </div>
                        <div class="content">
                            <h4 class="title">
                                <span>${p.title}</span>
                                <span class="location-icon">📍 القاهرة</span>
                            </h4>
                            <div class="details-info">
                                <span>📏 ${p.area} م²</span>
                                <span>🛏️ ${p.rooms} غرف</span>
                            </div>
                        </div>
                        ${isOwner ? `
                            <div class="actions">
                                <button class="btn-edit" onclick="openEditProperty(event, '${p.id}')">تعديل</button>
                                <button class="btn-delete" onclick="deleteProperty(event, '${p.id}')">حذف</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                list.innerHTML += cardHtml;
            });
        }

        // --- Add Property ---
        async function addProperty() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                alert("يجب تسجيل الدخول أولاً لإضافة عقار");
                return;
            }
            const userId = session.user.id;

            const file = document.getElementById("image").files[0];
            if (!file) {
                alert("اختر صورة");
                return;
            }

            // Disable button and show loading state
            const saveBtn = document.getElementById("save-btn");
            const originalBtnText = saveBtn.innerText;
            saveBtn.innerText = "جاري نشر العقار... ⏳";
            saveBtn.style.pointerEvents = "none";
            saveBtn.style.opacity = "0.7";
            showLoading(true);

            // Clean file name and upload image
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            const { error: uploadError } = await supabaseClient.storage.from('images').upload(fileName, file, {
                contentType: file.type
            });

            if (uploadError) {
                alert("خطأ في رفع الصورة! تأكد من إنشاء Bucket باسم 'images' في لوحة تحكم Supabase.");
                console.error("Storage Upload Error:", uploadError);

                // Revert button and close loading overlay
                saveBtn.innerText = originalBtnText;
                saveBtn.style.pointerEvents = "auto";
                saveBtn.style.opacity = "1";
                showLoading(false);
                return;
            }

            // Get public URL of the image
            const { data } = supabaseClient.storage.from('images').getPublicUrl(fileName);

            // Insert property data
            const { error: insertError } = await supabaseClient.from('properties').insert([{
                title: document.getElementById("title").value,
                location: document.getElementById("location").value,
                area: parseInt(document.getElementById("area").value),
                rooms: parseInt(document.getElementById("rooms").value),
                phone: document.getElementById("phone").value,
                image_url: data.publicUrl,
                user_id: userId
            }]);

            showLoading(false);

            if (insertError) {
                alert("خطأ في إضافة العقار: " + insertError.message);
                // Revert button
                saveBtn.innerText = originalBtnText;
                saveBtn.style.pointerEvents = "auto";
                saveBtn.style.opacity = "1";
            } else {
                alert("تم الإضافة ✅");
                // Clear input fields
                document.getElementById("title").value = "";
                document.getElementById("location").value = "";
                document.getElementById("area").value = "";
                document.getElementById("rooms").value = "";
                document.getElementById("phone").value = "";
                document.getElementById("image").value = "";

                // Revert button and go to home
                saveBtn.innerText = originalBtnText;
                saveBtn.style.pointerEvents = "auto";
                saveBtn.style.opacity = "1";
                goHome();
            }
        }

        // --- Delete Property ---
        async function deleteProperty(event, propertyId) {
            event.stopPropagation();
            if (!confirm("هل أنت متأكد من حذف هذا العقار؟")) return;

            showLoading(true);
            const { error } = await supabaseClient
                .from('properties')
                .delete()
                .eq('id', propertyId);
            showLoading(false);

            if (error) {
                alert("حدث خطأ أو ليس لديك صلاحية لحذف هذا العقار: " + error.message);
            } else {
                alert("تم الحذف بنجاح!");
                loadData();
            }
        }

        // --- Edit Property (Stub) ---
        function openEditProperty(event, propertyId) {
            event.stopPropagation();
            alert("وظيفة تعديل العقار غير متاحة في هذا التصميم المحدث حالياً.");
        }

        // --- View Property Details ---
        function viewProperty(id) {
            const p = propertiesData.find(prop => prop.id === id);
            if (!p) return;

            const imageUrl = p.image_url ? p.image_url.split(',')[0] : 'https://img.icons8.com/plasticine/200/home.png';

            // Fill detail screen fields
            document.getElementById("detail-image").src = imageUrl;
            document.getElementById("detail-title").innerText = p.title;
            document.getElementById("detail-location").innerText = p.location;
            document.getElementById("detail-area").innerText = `${p.area} م²`;
            document.getElementById("detail-rooms").innerText = `${p.rooms} غرف`;

            // Contact section logic
            const callBtn = document.getElementById("call-btn");
            const whatsappBtn = document.getElementById("whatsapp-btn");
            const noContactText = document.getElementById("no-contact-text");

            if (p.phone) {
                callBtn.href = `tel:${p.phone}`;
                whatsappBtn.href = `https://wa.me/${p.phone}`;
                callBtn.style.display = "block";
                whatsappBtn.style.display = "block";
                noContactText.style.display = "none";
            } else {
                callBtn.style.display = "none";
                whatsappBtn.style.display = "none";
                noContactText.style.display = "block";
            }

            showScreen("details");
        }

        // Initial check for user and load home screen
        async function init() {
            // Wait for 1 second on splash screen, then check user session and load home
            setTimeout(async () => {
                const { data: { session } } = await supabaseClient.auth.getSession();
                goHome();
            }, 1000);
        }

        window.onload = init;
    </script>

</body>

</html>
