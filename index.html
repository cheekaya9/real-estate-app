<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بدلها</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        :root {
            --primary: #2BB673;
            --secondary: #1E90FF;
            --text-primary: #333;
            --text-secondary: #777;
            --bg-body: #F4F4F4;
            --bg-card: #FFFFFF;
            --bg-input: #FFFFFF;
            --border-color: #E0E0E0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --header-bg: transparent;
        }

        body.dark-mode {
            --text-primary: #F1F1F1;
            --text-secondary: #AAAAAA;
            --bg-body: #121212;
            --bg-card: #1E1E1E;
            --bg-input: #2C2C2C;
            --border-color: #444;
            --shadow: 0 4px 12px rgba(255, 255, 255, 0.05);
            --header-bg: #121212;
        }

        body {
            background: var(--bg-body);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone {
            width: 320px;
            height: 640px;
            background: var(--bg-card);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            border: 5px solid #EAEAEA;
        }

        @media (max-width: 600px) {
            .phone {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
                border: none;
            }
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: var(--bg-body); /* Added solid background */
        }

        .screen.active {
            display: block;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        /* Splash Screen */
        #splash {
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #splash .logo {
            font-size: 36px;
            color: var(--primary);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #splash img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }

        #splash .subtitle {
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Home Screen */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header .title {
            font-weight: bold;
            font-size: 18px;
        }

        .header .search-icon {
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .banner {
            background: rgba(43, 182, 115, 0.1);
            color: var(--text-primary);
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .banner p {
            margin-bottom: 15px;
            font-size: 15px;
        }

        .banner .btn-add {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .properties-list {
            padding: 0 15px;
        }

        .property-card {
            background: var(--bg-card);
            border-radius: 15px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .property-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        .property-card .image-container {
            width: 100%;
            height: 180px;
            position: relative;
        }

        .property-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .property-card .match-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(43, 182, 115, 0.9);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .property-card .content {
            padding: 15px;
        }

        .property-card .title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }

        .property-card .title .location-icon {
            font-size: 14px;
            color: var(--text-secondary);
            margin-right: 5px;
        }

        .property-card .details-info {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .property-card .details-info span {
            display: flex;
            align-items: center;
        }

        .property-card .actions {
            display: flex;
            gap: 10px;
            padding: 0 15px 15px 15px;
        }

        .property-card .btn-edit,
        .property-card .btn-delete {
            flex: 1;
            padding: 8px 0;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .property-card .btn-edit {
            background: var(--secondary);
            color: white;
        }

        .property-card .btn-delete {
            background: #ff4757;
            color: white;
        }

        .logout-link {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            color: #ff4757;
            cursor: pointer;
            font-size: 14px;
        }

        /* Auth Screen */
        #auth .header {
            justify-content: center;
        }

        #auth .content {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #auth h2 {
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            width: 100%;
            margin-bottom: 15px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
        }

        .password-container input {
            padding-right: 12px;
            padding-left: 40px;
        }

        .eye-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .auth-actions {
            width: 100%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-auth {
            padding: 12px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
            color: white;
        }

        .btn-primary {
            background: var(--primary);
        }

        .btn-secondary {
            background: var(--secondary);
        }

        .btn-register {
            background: none;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-back {
            background: none;
            color: var(--text-secondary);
            border: none;
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
        }

        /* Add Property Screen */
        #add .header {
            padding: 10px 15px;
        }

        .header .btn-back-header {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
        }

        .form-group {
            padding: 15px;
        }

        .image-upload {
            border: 2px dashed var(--border-color);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            background: var(--bg-card);
        }

        .image-upload span {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-inputs {
            background: var(--bg-card);
            border-radius: 15px;
            box-shadow: var(--shadow);
            padding: 15px;
            margin-bottom: 20px;
        }

        .form-inputs input,
        .form-inputs select {
            width: 100%;
            padding: 12px;
            border: none;
            border-bottom: 1px solid var(--border-color);
            border-radius: 0;
            background: transparent;
            margin-bottom: 5px;
        }

        .form-inputs input:last-child {
            border-bottom: none;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 20px;
            width: 100%;
            border: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Details Screen */
        #details .image-slider {
            width: 100%;
            height: 250px;
            position: relative;
        }

        #details img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #details .details-content {
            padding: 20px;
            background: var(--bg-card); /* Changed to card background for better contrast */
            position: relative;
            top: -30px; /* Pull it up a bit more */
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05); /* Added top shadow */
            min-height: calc(100% - 220px);
        }

        #details h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        #details .location {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        #details .details-card {
            background: var(--bg-card);
            border-radius: 15px;
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 20px;
        }

        #details .details-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        #details .label {
            color: var(--text-secondary);
        }

        #details .contact-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #details .btn-contact {
            text-decoration: none;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            color: white;
            font-size: 15px;
        }

        #details .btn-call {
            background: var(--secondary);
        }

        #details .btn-whatsapp {
            background: #25D366;
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            left: 15px; /* Use left because dir="rtl", so this is the "start" corner usually, but top-left is often used for settings */
            background: rgba(var(--bg-card), 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 38px;
            height: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 1001;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.1);
            background: var(--bg-card);
        }
        /* Elegant Splash Button */
        .btn-elegant {
            background: linear-gradient(135deg, var(--primary), #249d63);
            color: white;
            padding: 15px 45px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(43, 182, 115, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .btn-elegant:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(43, 182, 115, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        /* Pull to Refresh Indicator */
        #ptr-indicator {
            height: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-body);
            transition: height 0.2s;
            font-size: 14px;
            color: var(--primary);
            font-weight: bold;
        }

        #loading-more {
            text-align: center;
            padding: 15px;
            display: none;
            color: var(--text-secondary);
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div id="loading-overlay">جاري تحميل البيانات...</div>

    <div class="phone">

        <!-- Theme Toggle -->
        <div class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙</div>

        <!-- Splash Screen -->
        <div class="screen active" id="splash">
            <div class="content" style="height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center;">
                <div style="margin-bottom: 30px;">
                    <img src="https://picsum.photos/seed/realestate/400/400" alt="بدلها" style="width: 140px; height: 140px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);" referrerPolicy="no-referrer">
                </div>
                <h2 style="color: var(--text-secondary); font-size: 18px; margin-bottom: 50px; font-weight: 400;">بدل عقارك بسهولة مع</h2>
                
                <button class="btn-elegant" onclick="startApp()">بدلها</button>
            </div>
        </div>

        <!-- Auth Screen -->
        <div class="screen" id="auth">
            <div class="header">حسابي</div>
            <div class="content">
                <h2>أهلاً بك</h2>
                <div class="input-group">
                    <input type="email" id="email" placeholder="البريد الإلكتروني">
                </div>
                <div class="input-group password-container">
                    <input type="password" id="password" placeholder="كلمة المرور">
                    <span class="eye-icon" onclick="togglePassword('password')">👁️</span>
                </div>
                <div class="auth-actions">
                    <button class="btn-auth btn-primary" onclick="login()">تسجيل الدخول</button>
                    <button class="btn-auth btn-secondary" onclick="register()">حساب جديد</button>
                    <button class="btn-back" onclick="goHome()">رجوع</button>
                </div>
            </div>
        </div>

        <!-- Home Screen -->
        <div class="screen" id="home">
            <div id="ptr-indicator">جاري التحديث... 🔄</div>
            <div class="header">
                <span class="title">القاهرة</span>
                <span class="search-icon">🔍</span>
            </div>

            <div class="banner">
                <p>ابحث وابدأ تبديل عقارك الآن</p>
                <button class="btn-add" onclick="goAdd()">ضيف عقارك +</button>
            </div>

            <div class="properties-list" id="list">
                <!-- Properties will be added here -->
            </div>

            <div class="logout-link" id="auth-btn" onclick="logout()">خروج</div>
        </div>

        <!-- Add Property Screen -->
        <div class="screen" id="add">
            <div class="header">
                <span class="btn-back-header" onclick="goHome()">➔</span>
                <span class="title">ضيف عقارك</span>
            </div>

            <div class="form-group">
                <div class="image-upload" onclick="document.getElementById('image').click()">
                    <span>+ أضف صور</span>
                </div>
                <input type="file" id="image" style="display: none;">

                <div class="form-inputs">
                    <input id="title" placeholder="اسم العقار">
                    <input id="location" placeholder="الموقع">
                    <input id="area" placeholder="المساحة">
                    <input id="rooms" placeholder="عدد الغرف">
                    <input id="phone" type="tel" placeholder="رقم الهاتف للتواصل">
                </div>

                <button class="btn-submit" id="save-btn" onclick="addProperty()">نشر العقار</button>
            </div>
        </div>

        <!-- Details Screen -->
        <div class="screen" id="details">
            <div class="image-slider">
                <span class="btn-back-header" onclick="goHome()"
                    style="position: absolute; top: 15px; right: 15px; color: white; background: rgba(0,0,0,0.5); width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; border-radius: 50%; z-index: 10;">➔</span>
                <img id="detail-image" src="" alt="Property Image" referrerPolicy="no-referrer" onerror="this.src='https://img.icons8.com/plasticine/200/home.png'">
            </div>

            <div class="details-content">
                <h2 id="detail-title"></h2>
                <div class="location">
                    <span>📍</span>
                    <span id="detail-location"></span>
                </div>

                <div class="details-card">
                    <div class="details-item">
                        <span class="label">المساحة</span>
                        <span id="detail-area"></span>
                    </div>
                    <div class="details-item">
                        <span class="label">عدد الغرف</span>
                        <span id="detail-rooms"></span>
                    </div>
                </div>

                <div class="contact-btns">
                    <a href="#" class="btn-contact btn-call" id="call-btn">📞 اتصال هاتفي</a>
                    <a href="#" class="btn-contact btn-whatsapp" id="whatsapp-btn">💬 تواصل واتساب</a>
                    <p style="text-align: center; color: var(--text-secondary); margin-top: 15px;" id="no-contact-text">
                        رقم التواصل غير متوفر</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Check if supabase is loaded
        if (typeof supabase === 'undefined') {
            alert("خطأ: تعذر تحميل مكتبة Supabase. يرجى التحقق من اتصال الإنترنت.");
        }

        // Use Supabase credentials from the input
        const SUPABASE_URL = "https://arycfnlqkgrqxyqixcpa.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyeWNmbmxxa2dycXh5cWl4Y3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTQwNjgsImV4cCI6MjA5MjI5MDA2OH0.3olrFQ-tTNIHgvtExloyCyqqm0xw_aWhokHfxWhyDD8";
        const supabaseClient = (typeof supabase !== 'undefined') ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        let propertiesData = [];
        let currentUserId = null;

        // Function to show/hide loading overlay
        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }

        // --- Screen Navigation ---
        function showScreen(screenId) {
            document.querySelectorAll(".screen").forEach(screen => {
                screen.classList.remove("active");
            });
            document.getElementById(screenId).classList.add("active");
        }

        function goHome() {
            showScreen("home");
            loadData();
        }

        async function goAdd() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showScreen("add");
            } else {
                alert("يرجى تسجيل الدخول أو إنشاء حساب لإضافة عقار.");
                showScreen("auth");
            }
        }

        // --- Dark Mode ---
        function toggleTheme() {
            const btn = document.getElementById("theme-btn");
            btn.style.transform = "rotate(360deg)";
            
            setTimeout(() => {
                document.body.classList.toggle("dark-mode");
                const isDark = document.body.classList.contains("dark-mode");
                btn.innerText = isDark ? "☀️" : "🌙";
                btn.style.transform = "rotate(0deg)";
                localStorage.setItem("theme", isDark ? "dark" : "light");
            }, 150);
        }

        // Apply dark mode on load
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark-mode");
            document.getElementById("theme-btn").innerText = "☀️";
        }

        // --- Auth System ---
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
        }

        async function register() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            if (!email || !password) return alert("الرجاء إدخال البريد الإلكتروني وكلمة المرور");

            showLoading(true);
            try {
                const { error } = await supabaseClient.auth.signUp({ email, password });
                if (error) {
                    alert("خطأ في إنشاء الحساب: " + error.message);
                } else {
                    alert("تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن.");
                    showScreen("auth");
                }
            } catch (err) {
                console.error("Register error:", err);
                alert("حدث خطأ غير متوقع.");
            } finally {
                showLoading(false);
            }
        }

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            if (!email || !password) return alert("الرجاء إدخال البريد الإلكتروني وكلمة المرور");

            showLoading(true);
            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    alert("بيانات الدخول غير صحيحة!");
                } else {
                    goHome();
                }
            } catch (err) {
                console.error("Login error:", err);
                alert("حدث خطأ غير متوقع.");
            } finally {
                showLoading(false);
            }
        }

        async function logout() {
            showLoading(true);
            try {
                await supabaseClient.auth.signOut();
                goHome();
            } catch (err) {
                console.error("Logout error:", err);
            } finally {
                showLoading(false);
            }
        }

        // --- Load Properties ---
        async function loadData() {
            try {
                // Get current user session
                const { data: { session } } = await supabaseClient.auth.getSession();
                currentUserId = session ? session.user.id : null;

                // Update login/logout button
                const authBtn = document.getElementById("auth-btn");
                if (currentUserId) {
                    authBtn.style.display = "block";
                    authBtn.innerText = "خروج";
                    authBtn.style.color = "#ff4757";
                    authBtn.onclick = logout;
                } else {
                    authBtn.style.display = "block";
                    authBtn.innerText = "دخول";
                    authBtn.style.color = "#1e90ff";
                    authBtn.onclick = () => showScreen("auth");
                }

                const list = document.getElementById("list");
                list.innerHTML = `<div style="text-align: center; margin-top: 50px; color: var(--text-sub);">جاري جلب البيانات... ⏳</div>`;

                showLoading(true);
                const { data, error } = await supabaseClient.from('properties').select("*");
                
                if (error) {
                    list.innerHTML = `<div style="text-align: center; margin-top: 50px; color: #ff4757;">خطأ في جلب البيانات</div>`;
                    console.error("Error fetching data:", error);
                } else {
                    propertiesData = data;
                    renderProperties(propertiesData);
                }
            } catch (err) {
                console.error("Load Data error:", err);
                const list = document.getElementById("list");
                if (list) list.innerHTML = `<div style="text-align: center; margin-top: 50px; color: #ff4757;">حدث خطأ في الاتصال</div>`;
            } finally {
                showLoading(false);
            }
        }

        function renderProperties(data) {
            const list = document.getElementById("list");
            list.innerHTML = "";

            if (data.length === 0) {
                list.innerHTML = `<div style="text-align: center; margin-top: 50px; color: var(--text-sub);">لا توجد عقارات مطابقة 🔍</div>`;
                return;
            }

            data.forEach(p => {
                const imageUrl = p.image_url ? p.image_url.split(',')[0] : 'https://img.icons8.com/plasticine/200/home.png';
                const isOwner = currentUserId && p.user_id === currentUserId;

                const cardHtml = `
                    <div class="property-card" onclick="viewProperty('${p.id}')">
                        <div class="image-container">
                            <img src="${imageUrl}" alt="${p.title}" referrerPolicy="no-referrer" onerror="this.src='https://img.icons8.com/plasticine/200/home.png'">
                            ${isOwner ? '<span class="match-badge">90%</span>' : ''}
                        </div>
                        <div class="content">
                            <h4 class="title">
                                <span>${p.title}</span>
                                <span class="location-icon">📍 القاهرة</span>
                            </h4>
                            <div class="details-info">
                                <span>📏 ${p.area} م²</span>
                                <span>🛏️ ${p.rooms} غرف</span>
                            </div>
                        </div>
                        ${isOwner ? `
                            <div class="actions">
                                <button class="btn-edit" onclick="openEditProperty(event, '${p.id}')">تعديل</button>
                                <button class="btn-delete" onclick="deleteProperty(event, '${p.id}')">حذف</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                list.innerHTML += cardHtml;
            });
        }

        // --- Add Property ---
        async function addProperty() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                alert("يجب تسجيل الدخول أولاً لإضافة عقار");
                return;
            }
            const userId = session.user.id;

            const file = document.getElementById("image").files[0];
            if (!file) {
                alert("اختر صورة");
                return;
            }

            // Disable button and show loading state
            const saveBtn = document.getElementById("save-btn");
            const originalBtnText = saveBtn.innerText;
            saveBtn.innerText = "جاري نشر العقار... ⏳";
            saveBtn.style.pointerEvents = "none";
            saveBtn.style.opacity = "0.7";
            showLoading(true);

            try {
                // Clean file name and upload image
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const { error: uploadError } = await supabaseClient.storage.from('images').upload(fileName, file, {
                    contentType: file.type
                });

                if (uploadError) {
                    alert("خطأ في رفع الصورة! تأكد من إنشاء Bucket باسم 'images' في لوحة تحكم Supabase.");
                    console.error("Storage Upload Error:", uploadError);
                    return;
                }

                // Get public URL of the image
                const { data } = supabaseClient.storage.from('images').getPublicUrl(fileName);

                // Insert property data
                const { error: insertError } = await supabaseClient.from('properties').insert([{
                    title: document.getElementById("title").value,
                    location: document.getElementById("location").value,
                    area: parseInt(document.getElementById("area").value),
                    rooms: parseInt(document.getElementById("rooms").value),
                    phone: document.getElementById("phone").value,
                    image_url: data.publicUrl,
                    user_id: userId
                }]);

                if (insertError) {
                    alert("خطأ في إضافة العقار: " + insertError.message);
                } else {
                    alert("تم الإضافة ✅");
                    // Clear input fields
                    document.getElementById("title").value = "";
                    document.getElementById("location").value = "";
                    document.getElementById("area").value = "";
                    document.getElementById("rooms").value = "";
                    document.getElementById("phone").value = "";
                    document.getElementById("image").value = "";
                    
                    goHome();
                }
            } catch (err) {
                console.error("Add Property error:", err);
                alert("حدث خطأ عير متوقع");
            } finally {
                // Revert button and close loading overlay
                saveBtn.innerText = originalBtnText;
                saveBtn.style.pointerEvents = "auto";
                saveBtn.style.opacity = "1";
                showLoading(false);
            }
        }

        // --- Delete Property ---
        async function deleteProperty(event, propertyId) {
            event.stopPropagation();
            if (!confirm("هل أنت متأكد من حذف هذا العقار؟")) return;

            showLoading(true);
            const { error } = await supabaseClient
                .from('properties')
                .delete()
                .eq('id', propertyId);
            showLoading(false);

            if (error) {
                alert("حدث خطأ أو ليس لديك صلاحية لحذف هذا العقار: " + error.message);
            } else {
                alert("تم الحذف بنجاح!");
                loadData();
            }
        }

        // --- Edit Property (Stub) ---
        function openEditProperty(event, propertyId) {
            event.stopPropagation();
            alert("وظيفة تعديل العقار غير متاحة في هذا التصميم المحدث حالياً.");
        }

        // --- View Property Details ---
        function viewProperty(id) {
            const p = propertiesData.find(prop => String(prop.id) === String(id));
            if (!p) return;

            const imageUrl = p.image_url ? p.image_url.split(',')[0] : 'https://img.icons8.com/plasticine/200/home.png';

            // Fill detail screen fields
            document.getElementById("detail-image").src = imageUrl;
            document.getElementById("detail-title").innerText = p.title;
            document.getElementById("detail-location").innerText = p.location;
            document.getElementById("detail-area").innerText = `${p.area} م²`;
            document.getElementById("detail-rooms").innerText = `${p.rooms} غرف`;

            // Contact section logic
            const callBtn = document.getElementById("call-btn");
            const whatsappBtn = document.getElementById("whatsapp-btn");
            const noContactText = document.getElementById("no-contact-text");

            if (p.phone) {
                callBtn.href = `tel:${p.phone}`;
                whatsappBtn.href = `https://wa.me/${p.phone}`;
                callBtn.style.display = "block";
                whatsappBtn.style.display = "block";
                noContactText.style.display = "none";
            } else {
                callBtn.style.display = "none";
                whatsappBtn.style.display = "none";
                noContactText.style.display = "block";
            }

            showScreen("details");
        }

        async function startApp() {
            showLoading(true);
            if (supabaseClient) {
                try {
                    await supabaseClient.auth.getSession();
                } catch (e) {
                    console.error("Session check failed", e);
                }
            }
            showLoading(false);
            goHome();
        }

        // Initial check for user and load home screen
        async function init() {
            // Keep splash screen until button is clicked
            console.log("App initialized. Waiting on splash screen.");
        }

        window.onload = init;
    </script>

</body>

</html>
